[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
filterwarnings = [
    "ignore::DeprecationWarning",
]
[tool.pyright]
venv = "venv"
venvPath = ""

[tool.ruff]
line-length = 120
# Minimum supported runtime is 3.11 (PyMuPDF has no 3.14 wheel; prod runs 3.13).
# Pinning the floor keeps UP/pyupgrade from rewriting code into 3.12+-only syntax.
target-version = "py311"

[tool.ruff.lint]
select = [
    "E", "F", "I", "W",  # pycodestyle errors/warnings, Pyflakes, isort
    "UP",                # pyupgrade — modern 3.11+ syntax
    "B",                 # flake8-bugbear — likely bugs
    "SIM",               # flake8-simplify
    "C4",                # flake8-comprehensions
    "PIE",               # flake8-pie — misc anti-patterns
    "RET",               # flake8-return
    "G",                 # flake8-logging-format — no f-strings inside log calls
    "LOG",               # flake8-logging
    "ASYNC",             # flake8-async — blocking calls in async code (this app is async-first)
    "PT",                # flake8-pytest-style
    "N",                 # pep8-naming
    "RUF",               # Ruff-specific rules
]
# RUF001/002/003 (ambiguous Unicode, e.g. EN DASH) fire on intentional typography:
# this project's comments, docstrings and user-facing strings use real "–"/"—".
ignore = ["RUF001", "RUF002", "RUF003"]

[tool.ruff.lint.flake8-bugbear]
# FastAPI evaluates these dependency/parameter callables at request time, not
# at function-definition time, so B008 ("function call in default argument")
# does not apply — they are the framework's documented pattern.
extend-immutable-calls = [
    "fastapi.Depends",
    "fastapi.Query",
    "fastapi.Path",
    "fastapi.Header",
    "fastapi.Cookie",
    "fastapi.Body",
    "fastapi.Form",
    "fastapi.File",
    "fastapi.Security",
]

[tool.ruff.lint.per-file-ignores]
# main.py calls load_dotenv() before importing app.* so pydantic-settings reads a
# populated environment at import time; those imports sit below the call on purpose,
# so E402 (module-import-not-at-top) does not apply.
"app/main.py" = ["E402"]
