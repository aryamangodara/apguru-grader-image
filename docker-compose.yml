services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8080"
    volumes:
      - ./vertex-key.json:/app/vertex-key.json:ro
    logging:
      driver: awslogs
      options:
        awslogs-region: ap-south-1
        awslogs-group: /apguru/app
        awslogs-create-group: "true"
        awslogs-stream: apguru-app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /var/www/html/certs/apguru-analytics:/etc/nginx/certs:ro
    depends_on:
      app:
        condition: service_healthy
