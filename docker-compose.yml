services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    # Bind to localhost only. The /grader endpoints are PUBLIC (no auth) and return
    # student PII, so the container must NOT be exposed directly to the internet —
    # front it with the host's reverse proxy / edge (Nginx / ALB / WAF), which is
    # where access control (IP allowlist, etc.) belongs. See nginx/nginx.conf for a
    # sample host vhost. Override the host port with GRADER_HOST_PORT in .env if
    # 8081 is already taken by another container.
    ports:
      - "127.0.0.1:${GRADER_HOST_PORT:-8081}:8080"
    volumes:
      # Vertex service-account key (read-only). If you instead use the EC2 instance
      # role (Application Default Credentials), delete this line and unset
      # GOOGLE_APPLICATION_CREDENTIALS in .env.
      - ./vertex-key.json:/app/vertex-key.json:ro
    logging:
      driver: awslogs
      options:
        awslogs-region: ap-south-1
        awslogs-group: /apguru/app
        awslogs-create-group: "true"
        awslogs-stream: apguru-grader
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
