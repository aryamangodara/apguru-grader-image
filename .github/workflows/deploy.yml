name: Deploy to EC2

# Deploy is RELEASE-GATED: publishing a GitHub Release (e.g. tag v1.2.0) triggers a
# GitHub Actions self-hosted runner installed ON the EC2 host to rebuild & restart the
# grader container at that release's commit. Merges to main do NOT deploy — main can
# run ahead of prod. Use the manual "Run workflow" button (workflow_dispatch) to
# redeploy without cutting a release. No SSH key, no stored secrets, no inbound ports:
# code arrives via the built-in GITHUB_TOKEN and the build runs on the host.
on:
  release:
    types: [published]
  workflow_dispatch: {}

# Give each run a self-explanatory title in the Actions tab — which ref is going out
# and how it was triggered — instead of a generic "Deploy to EC2". Renders e.g.
# "Deploy v1.2.0 to EC2 (release)" or "Deploy main to EC2 (manual by @alice)".
run-name: >-
  Deploy ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
  to EC2 (${{ github.event_name == 'release' && 'release' || format('manual by @{0}', github.actor) }})

# Never let two deploys run at once; let an in-flight deploy finish.
concurrency:
  group: deploy-ec2
  cancel-in-progress: false

env:
  COMPOSE_PROJECT: apguru-grader
  # Stable deploy dir on the host (holds the host-only .env + vertex-key.json).
  # Override with an Actions repo *variable* named DEPLOY_DIR if you use another path.
  DEPLOY_DIR: ${{ vars.DEPLOY_DIR || '/opt/apguru/grader' }}
  # Must match GRADER_HOST_PORT in the host .env (the container binds 127.0.0.1:PORT).
  GRADER_HOST_PORT: ${{ vars.GRADER_HOST_PORT || '8081' }}

jobs:
  deploy:
    # Runs on the self-hosted runner installed on the EC2 instance. Add the
    # `apguru-grader` label when registering the runner so the job pins to this box.
    runs-on: [self-hosted, apguru-grader]
    steps:
      - name: Checkout
        # On a `release` event this checks out the released tag's commit (a
        # reproducible deploy of exactly what was released); on manual
        # workflow_dispatch it checks out the chosen branch (default: main).
        # @v5 runs on Node 24 — @v4 targets the deprecated Node 20 and the runner
        # was force-running it on Node 24, which logs a deprecation warning.
        uses: actions/checkout@v5

      - name: Describe deployment
        # Surface WHAT is being deployed up-front: in the step log AND as a rendered
        # table on the run's Summary page (Actions tab → this run → Summary). GitHub
        # context is passed through env vars rather than interpolated into the script,
        # so a crafted ref/tag can't inject shell on the self-hosted runner.
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REF_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "release" ]; then
            trigger="published release $RELEASE_TAG"
          else
            trigger="manual redeploy of $REF_NAME"
          fi
          short_sha="${COMMIT_SHA:0:7}"
          echo "Trigger      : $trigger"
          echo "Ref          : $REF_NAME"
          echo "Commit       : $short_sha"
          echo "Triggered by : @$ACTOR"
          echo "Deploy dir   : $DEPLOY_DIR"
          echo "Container    : $COMPOSE_PROJECT on 127.0.0.1:$GRADER_HOST_PORT"
          {
            echo "## 🚀 Deploying APGuru Grader to EC2"
            echo ""
            echo "| Field | Value |"
            echo "| ----- | ----- |"
            echo "| Trigger | $trigger |"
            echo "| Ref | \`$REF_NAME\` |"
            echo "| Commit | \`$short_sha\` |"
            echo "| Triggered by | @$ACTOR |"
            echo "| Deploy dir | \`$DEPLOY_DIR\` |"
            echo "| Container | \`$COMPOSE_PROJECT\` → 127.0.0.1:$GRADER_HOST_PORT |"
          } >> "$GITHUB_STEP_SUMMARY"

      # Sync the fresh checkout into the stable deploy dir. --delete keeps it in
      # step with main; the excludes protect host-only secrets/state.
      - name: Sync code to deploy dir
        run: |
          set -euo pipefail
          mkdir -p "$DEPLOY_DIR"
          echo "::group::rsync → $DEPLOY_DIR"
          rsync -a --delete --itemize-changes \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='vertex-key.json' \
            --exclude='venv/' \
            --exclude='__pycache__/' \
            --exclude='.ruff_cache/' \
            --exclude='.pytest_cache/' \
            ./ "$DEPLOY_DIR/"
          echo "::endgroup::"

      # Build the new image and restart only the grader stack. The app does NOT run
      # migrations — schema changes are applied by the central `apguru-centralized-alembic`
      # pipeline; this deploy only rebuilds and restarts the grader container.
      - name: Build & restart
        run: |
          set -euo pipefail
          cd "$DEPLOY_DIR"
          echo "::group::docker compose up -d --build"
          docker compose -p "$COMPOSE_PROJECT" up -d --build
          echo "::endgroup::"
          docker image prune -f
          echo "Running containers:"
          docker compose -p "$COMPOSE_PROJECT" ps

      # Poll the container's localhost-bound port until healthy. On success record the
      # running stack on the run summary; on failure dump recent logs (in-line and on
      # the summary) and fail the job.
      - name: Health check
        run: |
          set -uo pipefail
          cd "$DEPLOY_DIR"
          health_url="http://127.0.0.1:${GRADER_HOST_PORT}/api/v1/health"
          for i in $(seq 1 30); do
            if curl -fsS "$health_url" >/dev/null; then
              waited=$(( i * 3 ))
              echo "grader healthy after ~${waited}s"
              ps_out="$(docker compose -p "$COMPOSE_PROJECT" ps || true)"
              echo "$ps_out"
              {
                echo ""
                echo "### ✅ Deployment succeeded"
                echo "Grader is healthy at \`$health_url\` (after ~${waited}s)."
                echo ""
                echo '```'
                echo "$ps_out"
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            sleep 3
          done
          echo "::error::grader did not become healthy within 90s"
          logs_out="$(docker compose -p "$COMPOSE_PROJECT" logs --tail=80 2>&1 || true)"
          echo "$logs_out"
          {
            echo ""
            echo "### ❌ Deployment failed"
            echo "Grader did not pass the health check at \`$health_url\` within 90s. Recent container logs:"
            echo ""
            echo '```'
            echo "$logs_out"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1
