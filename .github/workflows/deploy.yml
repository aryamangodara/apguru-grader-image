name: Deploy to EC2

# Push to main → sync code to the EC2 host → rebuild & restart the grader
# container. The image is built ON the host (docker compose --build); no registry.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never let two deploys run at once; let an in-flight deploy finish.
concurrency:
  group: deploy-ec2
  cancel-in-progress: false

env:
  COMPOSE_PROJECT: apguru-grader
  GRADER_HOST_PORT: "8081"          # must match GRADER_HOST_PORT in the host .env

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      # Sync the working tree to the host. --delete keeps the deploy dir in sync
      # with main, but the excludes protect host-only secrets/state so they are
      # never overwritten or removed.
      - name: Sync code to EC2
        run: |
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='vertex-key.json' \
            --exclude='venv/' \
            --exclude='__pycache__/' \
            --exclude='.ruff_cache/' \
            --exclude='.pytest_cache/' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            ./ "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.EC2_DEPLOY_DIR }}/"

      # Build the new image and restart only the grader stack. The container
      # entrypoint runs `alembic upgrade head` on start, so migrations apply here.
      - name: Build & restart on EC2
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" bash -se <<'REMOTE'
          set -euo pipefail
          cd "${{ secrets.EC2_DEPLOY_DIR }}"
          docker compose -p ${{ env.COMPOSE_PROJECT }} up -d --build
          docker image prune -f
          REMOTE

      # Poll the container's localhost-bound port until healthy; dump logs on failure.
      - name: Health check
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" bash -se <<'REMOTE'
          set -uo pipefail
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:${{ env.GRADER_HOST_PORT }}/api/v1/health" >/dev/null; then
              echo "grader healthy"; exit 0
            fi
            sleep 3
          done
          echo "::error::grader did not become healthy"
          cd "${{ secrets.EC2_DEPLOY_DIR }}"
          docker compose -p ${{ env.COMPOSE_PROJECT }} logs --tail=80 || true
          exit 1
          REMOTE
