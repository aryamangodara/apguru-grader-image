name: Deploy to EC2

# Push to main → a GitHub Actions self-hosted runner installed ON the EC2 host
# rebuilds & restarts the grader container locally. No SSH key, no stored secrets,
# no inbound ports: the code arrives via the built-in GITHUB_TOKEN and the build
# runs on the host.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never let two deploys run at once; let an in-flight deploy finish.
concurrency:
  group: deploy-ec2
  cancel-in-progress: false

env:
  COMPOSE_PROJECT: apguru-grader
  # Stable deploy dir on the host (holds the host-only .env + vertex-key.json).
  # Override with an Actions repo *variable* named DEPLOY_DIR if you use another path.
  DEPLOY_DIR: ${{ vars.DEPLOY_DIR || '/opt/apguru/grader' }}
  # Must match GRADER_HOST_PORT in the host .env (the container binds 127.0.0.1:PORT).
  GRADER_HOST_PORT: ${{ vars.GRADER_HOST_PORT || '8081' }}

jobs:
  deploy:
    # Runs on the self-hosted runner installed on the EC2 instance. Add the
    # `apguru-grader` label when registering the runner so the job pins to this box.
    runs-on: [self-hosted, apguru-grader]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Sync the fresh checkout into the stable deploy dir. --delete keeps it in
      # step with main; the excludes protect host-only secrets/state.
      - name: Sync code to deploy dir
        run: |
          set -euo pipefail
          mkdir -p "$DEPLOY_DIR"
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='vertex-key.json' \
            --exclude='venv/' \
            --exclude='__pycache__/' \
            --exclude='.ruff_cache/' \
            --exclude='.pytest_cache/' \
            ./ "$DEPLOY_DIR/"

      # Build the new image and restart only the grader stack. The container
      # entrypoint runs `alembic upgrade head` on start, so migrations apply here.
      - name: Build & restart
        run: |
          set -euo pipefail
          cd "$DEPLOY_DIR"
          docker compose -p "$COMPOSE_PROJECT" up -d --build
          docker image prune -f

      # Poll the container's localhost-bound port until healthy; dump logs on failure.
      - name: Health check
        run: |
          set -uo pipefail
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:${GRADER_HOST_PORT}/api/v1/health" >/dev/null; then
              echo "grader healthy"; exit 0
            fi
            sleep 3
          done
          echo "::error::grader did not become healthy"
          cd "$DEPLOY_DIR" && docker compose -p "$COMPOSE_PROJECT" logs --tail=80 || true
          exit 1
