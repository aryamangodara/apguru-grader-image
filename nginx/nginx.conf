# SAMPLE host reverse-proxy vhost for the grader.
#
# This is NOT used by docker-compose.yml. The grader container binds to
# 127.0.0.1:8081 on the host; install this vhost in the host's Nginx (or fold the
# equivalent into your existing edge proxy / ALB) to terminate TLS and front the
# grader on a subdomain. Adjust server_name, cert paths, and the access rules.

upstream apguru_grader {
    server 127.0.0.1:8081;   # = GRADER_HOST_PORT (docker-compose binds 127.0.0.1:8081->8080)
}

server {
    listen 80;
    server_name grader.apguru.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name grader.apguru.com;

    ssl_certificate     /etc/nginx/certs/grader/cert.pem;
    ssl_certificate_key /etc/nginx/certs/grader/key.pem;

    # PDFs can be large.
    client_max_body_size 25M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # ── ACCESS CONTROL (REQUIRED) ──────────────────────────────────────────────
    # The /grader endpoints are PUBLIC (no in-app auth) and return student PII, and
    # they fetch caller-supplied PDF URLs. Restrict to trusted callers here — e.g.
    # an IP allowlist, an internal-only listener, mTLS, or gateway auth. Example:
    #   allow 203.0.113.0/24;
    #   deny  all;

    location / {
        proxy_pass http://apguru_grader;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # register-exam (synchronous rubric parse) and handwriting OCR can run for
        # minutes — give the upstream generous timeouts.
        proxy_connect_timeout 10s;
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
    }
}
